table:
  name: circle_member
  schema: public
object_relationships:
  - name: circle
    using:
      foreign_key_constraint_on: circleId
  - name: member
    using:
      foreign_key_constraint_on: memberId
insert_permissions:
  - role: user
    permission:
      check:
        _and:
          - _not:
              _exists:
                _table:
                  name: circle_member
                  schema: public
                _where:
                  _and:
                    - id:
                        _cne: id
                    - circleId:
                        _ceq: circleId
                    - memberId:
                        _ceq: memberId
                    - archived:
                        _eq: false
          - circle:
              orgId:
                _ceq:
                  - $
                  - orgId
          - member:
              orgId:
                _ceq:
                  - $
                  - orgId
          - circle:
              _or:
                - org:
                    members:
                      _and:
                        - userId:
                            _eq: X-Hasura-User-Id
                        - role:
                            _eq: Owner
                - org:
                    _and:
                      - governanceMode:
                          _eq: Free
                      - members:
                          _and:
                            - userId:
                                _eq: X-Hasura-User-Id
                            - _or:
                                - role:
                                    _eq: Admin
                                - role:
                                    _eq: Member
                - _and:
                    - role:
                        parentLink:
                          _eq: false
                    - _or:
                        - parent:
                            leaders:
                              member:
                                userId:
                                  _eq: X-Hasura-User-Id
                        - children:
                            _and:
                              - role:
                                  parentLink:
                                    _eq: true
                              - archived:
                                  _eq: false
                              - members:
                                  _and:
                                    - member:
                                        userId:
                                          _eq: X-Hasura-User-Id
                                    - archived:
                                        _eq: false
                - _and:
                    - role:
                        parentLink:
                          _eq: true
                    - parent:
                        parent:
                          leaders:
                            member:
                              userId:
                                _eq: X-Hasura-User-Id
      columns:
        - circleId
        - id
        - memberId
        - orgId
select_permissions:
  - role: user
    permission:
      columns:
        - archived
        - circleId
        - createdAt
        - id
        - memberId
        - orgId
      filter: {}
      allow_aggregations: true
update_permissions:
  - role: user
    permission:
      columns:
        - archived
      filter:
        circle:
          _or:
            - org:
                members:
                  _and:
                    - userId:
                        _eq: X-Hasura-User-Id
                    - role:
                        _eq: Owner
            - org:
                _and:
                  - governanceMode:
                      _eq: Free
                  - members:
                      _and:
                        - userId:
                            _eq: X-Hasura-User-Id
                        - _or:
                            - role:
                                _eq: Admin
                            - role:
                                _eq: Member
            - _and:
                - role:
                    parentLink:
                      _eq: false
                - _or:
                    - parent:
                        leaders:
                          member:
                            userId:
                              _eq: X-Hasura-User-Id
                    - children:
                        _and:
                          - role:
                              parentLink:
                                _eq: true
                          - archived:
                              _eq: false
                          - members:
                              _and:
                                - member:
                                    userId:
                                      _eq: X-Hasura-User-Id
                                - archived:
                                    _eq: false
            - _and:
                - role:
                    parentLink:
                      _eq: true
                - parent:
                    parent:
                      leaders:
                        member:
                          userId:
                            _eq: X-Hasura-User-Id
      check: {}
event_triggers:
  - name: index-circle-member
    definition:
      delete:
        columns: '*'
      enable_manual: false
      insert:
        columns: '*'
      update:
        columns: '*'
    retry_conf:
      interval_sec: 10
      num_retries: 3
      timeout_sec: 60
    webhook: '{{BACKEND_URL}}/trigger'
    headers:
      - name: x-nhost-webhook-secret
        value_from_env: NHOST_WEBHOOK_SECRET
