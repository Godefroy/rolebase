table:
  name: thread_activity_reaction
  schema: public
object_relationships:
  - name: activity
    using:
      foreign_key_constraint_on: activityId
  - name: member
    using:
      foreign_key_constraint_on: memberId
insert_permissions:
  - role: user
    permission:
      check:
        _and:
          - activity:
              thread:
                org:
                  members:
                    _and:
                      - userId:
                          _eq: X-Hasura-User-Id
                      - role:
                          _neq: Readonly
          - member:
              userId:
                _eq: X-Hasura-User-Id
      set:
        userId: x-hasura-User-Id
      columns:
        - activityId
        - memberId
        - shortcode
    comment: ""
select_permissions:
  - role: user
    permission:
      columns:
        - activityId
        - createdAt
        - id
        - memberId
        - shortcode
        - userId
      filter: {}
      allow_aggregations: true
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        userId:
          _eq: X-Hasura-User-Id
    comment: ""
