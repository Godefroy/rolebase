table:
  name: circle_link
  schema: public
object_relationships:
  - name: hostCircle
    using:
      foreign_key_constraint_on: parentId
  - name: invitedCircle
    using:
      foreign_key_constraint_on: circleId
insert_permissions:
  - role: user
    permission:
      check:
        _and:
          - hostCircle:
              orgId:
                _ceq:
                  - $
                  - orgId
          - invitedCircle:
              orgId:
                _ceq:
                  - $
                  - orgId
          - hostCircle:
              _or:
                - org:
                    members:
                      _and:
                        - userId:
                            _eq: X-Hasura-User-Id
                        - role:
                            _eq: Owner
                - org:
                    _and:
                      - governanceMode:
                          _eq: Free
                      - members:
                          _and:
                            - userId:
                                _eq: X-Hasura-User-Id
                            - _or:
                                - role:
                                    _eq: Admin
                                - role:
                                    _eq: Member
                - _and:
                    - org:
                        governanceMode:
                          _neq: Strict
                    - leaders:
                        member:
                          userId:
                            _eq: X-Hasura-User-Id
      columns:
        - circleId
        - id
        - orgId
        - parentId
    comment: ""
select_permissions:
  - role: user
    permission:
      columns:
        - archivedAt
        - circleId
        - createdAt
        - id
        - orgId
        - parentId
      filter: {}
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - archivedAt
      filter:
        hostCircle:
          _or:
            - org:
                members:
                  _and:
                    - userId:
                        _eq: X-Hasura-User-Id
                    - role:
                        _eq: Owner
            - org:
                _and:
                  - governanceMode:
                      _eq: Free
                  - members:
                      _and:
                        - userId:
                            _eq: X-Hasura-User-Id
                        - _or:
                            - role:
                                _eq: Admin
                            - role:
                                _eq: Member
            - _and:
                - org:
                    governanceMode:
                      _neq: Strict
                - leaders:
                    member:
                      userId:
                        _eq: X-Hasura-User-Id
      check: null
    comment: ""
event_triggers:
  - name: index-circle-link
    definition:
      delete:
        columns: '*'
      enable_manual: false
      insert:
        columns: '*'
      update:
        columns: '*'
    retry_conf:
      interval_sec: 10
      num_retries: 3
      timeout_sec: 60
    webhook: '{{BACKEND_URL}}/trigger'
    headers:
      - name: x-nhost-webhook-secret
        value_from_env: NHOST_WEBHOOK_SECRET
