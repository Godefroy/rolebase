subscription userApps($userId: uuid!) {
  user_app(where: { userId: { _eq: $userId }, archivedAt: { _is_null: true } }) {
    ...UserApp
  }
}

mutation archiveUserApp($id: uuid!, $archivedAt: timestamptz!) {
  update_user_app_by_pk(
    pk_columns: { id: $id }
    _set: { archivedAt: $archivedAt }
  ) {
    id
  }
}
