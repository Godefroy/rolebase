query AdminOrgs($limit: Int!, $offset: Int!, $search: String!) {
  org(
    limit: $limit
    offset: $offset
    where: { name: { _ilike: $search }, archivedAt: { _is_null: true } }
    order_by: { createdAt: desc }
  ) {
    id
    name
    slug
    createdAt
    archivedAt
    org_subscription {
      id
      status
      type
    }
    members_aggregate {
      aggregate {
        count
      }
    }
  }
  org_aggregate(
    where: { name: { _ilike: $search }, archivedAt: { _is_null: true } }
  ) {
    aggregate {
      count
    }
  }
}
