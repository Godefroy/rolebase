query AdminStats($dauSince: timestamptz!, $mauSince: timestamptz!) {
  org_aggregate(where: { archivedAt: { _is_null: true } }) {
    aggregate {
      count
    }
  }
  usersAggregate {
    aggregate {
      count
    }
  }
  dau: usersAggregate(where: { lastSeen: { _gte: $dauSince } }) {
    aggregate {
      count
    }
  }
  mau: usersAggregate(where: { lastSeen: { _gte: $mauSince } }) {
    aggregate {
      count
    }
  }
}
