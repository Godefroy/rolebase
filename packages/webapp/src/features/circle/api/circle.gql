# PK lookup, ignores archived: loads a single circle and its role by id, so an
# archived circle's role panel can still be opened.
query getCircle($id: uuid!) {
  circle_by_pk(id: $id) {
    ...Circle
    role {
      ...RoleSummary
    }
  }
}

query getPublicCircles($orgId: uuid!) {
  circle(where: { orgId: { _eq: $orgId }, archivedAt: { _is_null: true } }) {
    id
    orgId
    roleId
    parentId
    members(where: { archivedAt: { _is_null: true } }) {
      id
      memberId
    }
    invitedCircleLinks(where: { archivedAt: { _is_null: true } }) {
      id
      invitedCircle {
        id
      }
    }
  }
  role(where: { orgId: { _eq: $orgId }, archivedAt: { _is_null: true } }) {
    id
    orgId
    base
    name
    purpose
    singleMember
    parentLink
    colorHue
  }
  member(where: { orgId: { _eq: $orgId }, archivedAt: { _is_null: true } }) {
    id
    orgId
    name
    picture
  }
}

query getCirclesStats($circlesIds: [uuid!]!) {
  thread_aggregate(
    where: { circleId: { _in: $circlesIds }, archivedAt: { _is_null: true } }
  ) {
    aggregate {
      count
    }
  }
  meeting_aggregate(
    where: { circleId: { _in: $circlesIds }, archivedAt: { _is_null: true } }
  ) {
    aggregate {
      count
    }
  }
  meeting_recurring_aggregate(
    where: { circleId: { _in: $circlesIds }, archivedAt: { _is_null: true } }
  ) {
    aggregate {
      count
    }
  }
  task_aggregate(
    where: { circleId: { _in: $circlesIds }, archivedAt: { _is_null: true } }
  ) {
    aggregate {
      count
    }
  }
  decision_aggregate(
    where: { circleId: { _in: $circlesIds }, archivedAt: { _is_null: true } }
  ) {
    aggregate {
      count
    }
  }
}

mutation createCircle($orgId: uuid!, $roleId: uuid!, $parentId: uuid) {
  insert_circle_one(
    object: { orgId: $orgId, roleId: $roleId, parentId: $parentId }
  ) {
    ...Circle
  }
}

mutation insertCircle($object: circle_insert_input!) {
  insert_circle_one(object: $object) {
    ...Circle
  }
}

mutation createCircles($circles: [circle_insert_input!]!) {
  insert_circle(objects: $circles) {
    returning {
      ...Circle
      role {
        ...Role
      }
    }
  }
}

mutation updateCircle($id: uuid!, $values: circle_set_input!) {
  update_circle_by_pk(pk_columns: { id: $id }, _set: $values) {
    ...Circle
    role {
      name
    }
    parent {
      role {
        name
      }
    }
  }
}

# Circle archive/restore (full nested cascade) is handled server-side by the
# backend tRPC mutations trpc.circle.archiveCircle / restoreCircle, so the
# archiveCircles / unarchiveCircles / getOrgCirclesForRestore operations have
# been removed from the client.
