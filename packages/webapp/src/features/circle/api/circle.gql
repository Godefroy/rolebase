# PK lookup, ignores archived: loads a single circle and its role by id, so an
# archived circle's role panel can still be opened.
query getCircle($id: uuid!) {
  circle_by_pk(id: $id) {
    ...Circle
    role {
      ...RoleSummary
    }
  }
}

query getPublicCircles($orgId: uuid!) {
  circle(where: { orgId: { _eq: $orgId }, archived: { _eq: false } }) {
    id
    orgId
    roleId
    parentId
    members(where: { archived: { _eq: false } }) {
      id
      memberId
    }
    invitedCircleLinks(where: { archived: { _eq: false } }) {
      id
      invitedCircle {
        id
      }
    }
  }
  role(where: { orgId: { _eq: $orgId }, archived: { _eq: false } }) {
    id
    orgId
    base
    name
    purpose
    singleMember
    parentLink
    colorHue
  }
  member(where: { orgId: { _eq: $orgId }, archived: { _eq: false } }) {
    id
    orgId
    name
    picture
  }
}

query getCirclesStats($circlesIds: [uuid!]!) {
  thread_aggregate(
    where: { circleId: { _in: $circlesIds }, archived: { _eq: false } }
  ) {
    aggregate {
      count
    }
  }
  meeting_aggregate(
    where: { circleId: { _in: $circlesIds }, archived: { _eq: false } }
  ) {
    aggregate {
      count
    }
  }
  meeting_recurring_aggregate(where: { circleId: { _in: $circlesIds } }) {
    aggregate {
      count
    }
  }
  task_aggregate(
    where: { circleId: { _in: $circlesIds }, archived: { _eq: false } }
  ) {
    aggregate {
      count
    }
  }
  decision_aggregate(
    where: { circleId: { _in: $circlesIds }, archived: { _eq: false } }
  ) {
    aggregate {
      count
    }
  }
}

mutation createCircle($orgId: uuid!, $roleId: uuid!, $parentId: uuid) {
  insert_circle_one(
    object: { orgId: $orgId, roleId: $roleId, parentId: $parentId }
  ) {
    ...Circle
  }
}

mutation insertCircle($object: circle_insert_input!) {
  insert_circle_one(object: $object) {
    ...Circle
  }
}

mutation createCircles($circles: [circle_insert_input!]!) {
  insert_circle(objects: $circles) {
    returning {
      ...Circle
      role {
        ...Role
      }
    }
  }
}

mutation updateCircle($id: uuid!, $values: circle_set_input!) {
  update_circle_by_pk(pk_columns: { id: $id }, _set: $values) {
    ...Circle
    role {
      name
    }
    parent {
      role {
        name
      }
    }
  }
}

mutation archiveCircles($circlesIds: [uuid!]!, $rolesIds: [uuid!]!) {
  update_circle(where: { id: { _in: $circlesIds } }, _set: { archived: true }) {
    returning {
      id
    }
  }
  update_role(where: { id: { _in: $rolesIds } }, _set: { archived: true }) {
    returning {
      id
    }
  }
  delete_meeting_recurring(where: { circleId: { _in: $circlesIds } }) {
    returning {
      id
    }
  }
}

mutation unarchiveCircles($circlesIds: [uuid!]!, $rolesIds: [uuid!]!) {
  update_circle(where: { id: { _in: $circlesIds } }, _set: { archived: false }) {
    returning {
      id
    }
  }
  update_role(where: { id: { _in: $rolesIds } }, _set: { archived: false }) {
    returning {
      id
    }
  }
}

# Archived circles of an org, to walk an archived subtree to restore
# (the whole subtree of an archived circle is archived too).
query getOrgCirclesForRestore($orgId: uuid!) {
  circle(where: { orgId: { _eq: $orgId }, archived: { _eq: true } }) {
    id
    parentId
    roleId
    role {
      base
    }
  }
}
