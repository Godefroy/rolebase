fragment Thread on thread {
  id
  orgId
  circleId
  initiatorMemberId
  title
  createdAt
  archivedAt
  pinned
  status
  private
  extra_members {
    ...ThreadExtraMember
  }
}

fragment ThreadMemberStatus on thread_member_status {
  lastReadActivityId
  lastReadDate
}

fragment ThreadWithFirstActivity on thread {
  ...Thread
  activities(
    where: { type: { _eq: Message }, archivedAt: { _is_null: true } }
    order_by: { createdAt: asc }
    limit: 1
  ) {
    ...ThreadActivity
  }
}
