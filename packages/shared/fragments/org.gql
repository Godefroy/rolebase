fragment Org on org {
  id
  name
  archived
  createdAt
  slug
  shareOrg
  shareMembers
  governanceMode
  defaultGraphView
  icon
  homeNote
}

# Flat org data: circles, members, roles and the join tables (circleMembers,
# circleLinks) are returned as separate top-level arrays. The client indexes
# them into a single OrgData object (new OrgData(...)).
fragment OrgData on org {
  ...Org
  org_subscription {
    ...OrgSubscription
  }
  circles(where: { archived: { _eq: false } }) {
    ...Circle
  }
  circleMembers(where: { archived: { _eq: false } }) {
    ...CircleMember
  }
  circleLinks(where: { archived: { _eq: false } }) {
    ...CircleLink
  }
  roles(where: { archived: { _eq: false } }) {
    ...RoleSummary
  }
  members(where: { archived: { _eq: false } }) {
    ...Member
  }
}
