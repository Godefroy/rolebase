fragment Org on org {
  id
  name
  archivedAt
  createdAt
  slug
  shareOrg
  shareMembers
  governanceMode
  defaultGraphView
  icon
  homeNote
}

# Flat org data: circles, members, roles and the join tables (circleMembers,
# circleLinks) are returned as separate top-level arrays. The client indexes
# them into a single OrgData object (new OrgData(...)).
fragment OrgData on org {
  ...Org
  org_subscription {
    ...OrgSubscription
  }
  circles(where: { archivedAt: { _is_null: true } }) {
    ...Circle
  }
  circleMembers(where: { archivedAt: { _is_null: true } }) {
    ...CircleMember
  }
  circleLinks(where: { archivedAt: { _is_null: true } }) {
    ...CircleLink
  }
  roles(where: { archivedAt: { _is_null: true } }) {
    ...RoleSummary
  }
  members(where: { archivedAt: { _is_null: true } }) {
    ...Member
  }
}
